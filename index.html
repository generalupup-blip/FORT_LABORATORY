<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORT LABORATORY</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #0a0f14; --surface: #0f161c; --surface2: #131c24; --border: #1e2d3a;
            --text: #e8edf2; --text2: #8a9ba8; --accent: #3b7c9c; --accent2: #4d9fc0;
            --danger: #b53b3b; --success: #2d7a4f; --info: #2b6f9c; --radius: 10px;
            --shadow: 0 8px 30px rgba(0,0,0,0.5); --transition: 0.25s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
        header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); box-shadow:0 2px 25px rgba(0,0,0,0.4); }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFD700; /* amarelo */
            animation: blink 1.5s infinite;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        @keyframes blink {
            0%   { opacity: 1; }
            50%  { opacity: 0.3; }
            100% { opacity: 1; }
        }
        nav { display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center; }
        nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.5rem 1.1rem; border-radius:20px; cursor:pointer; font-size:0.85rem; transition:var(--transition); font-weight:500; white-space:nowrap; }
        nav button:hover { background:var(--border); border-color:var(--accent); color:#c0e0f0; }
        .cart-badge { background:var(--accent); color:white; border-radius:50%; padding:0.15rem 0.45rem; font-size:0.7rem; font-weight:700; margin-left:4px; }
        main { max-width:1300px; margin:2rem auto; padding:0 1.5rem; }
        .section { display:none; animation:fadeIn 0.4s ease; }
        .section.active { display:block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        h2 { font-size:1.8rem; margin-bottom:1.5rem; color:var(--accent2); border-bottom:2px solid var(--border); padding-bottom:0.5rem; }
        .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:1.5rem; }
        .product-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; text-align:center; transition:var(--transition); box-shadow:var(--shadow); display:flex; flex-direction:column; gap:0.6rem; }
        .product-card:hover { transform:translateY(-5px); border-color:var(--accent); }
        .product-card img { width:100%; height:120px; object-fit:contain; border-radius:8px; background:var(--surface2); padding:0.5rem; }
        .product-card .name { font-weight:700; font-size:0.95rem; min-height:2.4rem; color:#fff; }
        .product-card .price { font-size:1.4rem; font-weight:800; color:var(--accent2); }
        .product-card .brand-tag { font-size:0.65rem; background:var(--surface2); padding:0.2rem 0.6rem; border-radius:12px; display:inline-block; color:var(--text2); text-transform:uppercase; }
        .qty-input { width:55px; padding:0.4rem; background:var(--surface2); border:1px solid var(--border); color:#fff; border-radius:6px; text-align:center; }
        .btn { background:var(--accent); color:white; border:none; padding:0.5rem 1.2rem; border-radius:20px; cursor:pointer; font-weight:700; font-size:0.85rem; transition:var(--transition); }
        .btn:hover { background:#4d9fc0; }
        .btn-danger { background:var(--danger); } .btn-success { background:var(--success); } .btn-info { background:var(--info); }
        .btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); }
        .btn-sm { padding:0.3rem 0.8rem; font-size:0.75rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; margin-bottom:0.3rem; font-weight:600; color:var(--text2); font-size:0.8rem; }
        .form-group input, .form-group select { width:100%; padding:0.6rem 1rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:#fff; font-size:1rem; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); }
        .search-box { width:100%; padding:0.7rem 1.2rem; background:var(--surface2); border:1px solid var(--border); border-radius:25px; color:#fff; font-size:1rem; margin-bottom:1.5rem; }
        .status-badge { padding:0.2rem 0.7rem; border-radius:20px; font-weight:700; font-size:0.7rem; text-transform:uppercase; }
        .status-pendente { background:#b8860b20; color:#d4a017; border:1px solid #b8860b40; }
        .status-finalizado { background:#2d7a4f20; color:#2ecc71; border:1px solid #2d7a4f40; }
        .toggle-brand { background:var(--surface2); border:1px solid var(--border); color:var(--accent2); padding:0.5rem 1.2rem; border-radius:20px; cursor:pointer; font-weight:600; font-size:0.8rem; margin:0.2rem; }
        .toggle-brand.active { background:var(--accent); color:white; border-color:var(--accent); }
        .brand-filters { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:1.5rem; }
        .image-preview { width:100px; height:100px; object-fit:contain; border:1px solid var(--border); border-radius:8px; background:var(--surface2); }
        .client-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem; margin-bottom:1rem; }
        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(4px); }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; max-width:500px; width:90%; }
        .empty-state { text-align:center; padding:3rem; color:var(--text2); }
        .hidden { display:none !important; }
        .flex-row { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
        .flex-between { justify-content:space-between; }
        .mt-2 { margin-top:1rem; } .mb-2 { margin-bottom:1rem; }
        .seguro-checkbox { display:flex; align-items:center; gap:0.5rem; margin:0.8rem 0; color:var(--text2); }
        .upload-group { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; }
        .file-input { padding:0.4rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:#fff; font-size:0.8rem; width:180px; }
        .whatsapp-link { color:#25d366; text-decoration:none; font-weight:700; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="showSection('catalogo')">FORT LABORATORY</div>
        <nav>
            <button onclick="showSection('catalogo')">🏪 Produtos</button>
            <button onclick="showSection('carrinho')">🛒 Carrinho <span class="cart-badge" id="cart-count">0</span></button>
            <button onclick="showSection('login')" id="nav-login">👤 Entrar / Cadastro</button>
            <button onclick="showSection('admin')" id="nav-admin" style="display:none;">📊 Dashboard</button>
            <button onclick="showSection('gerenciarClientes')" id="nav-clientes" style="display:none;">👥 Clientes</button>
            <button onclick="showSection('gerenciarProdutos')" id="nav-gerenciar" style="display:none;">🖼️ Produtos</button>
            <button onclick="logout()" id="nav-logout" style="display:none;">🚪 Sair</button>
        </nav>
    </header>
    <main>
        <!-- As seções (catálogo, carrinho, login, etc.) mantidas iguais ao código anterior -->
        <!-- ... -->
    </main>
    <script>
        // Configuração do Firebase e dados mantidos iguais
        // ...
        
        // Função finalizarPedido atualizada com mensagem completa para WhatsApp
        function finalizarPedido(){
            if(!clienteLogado) return alert('Faça login.');
            if(!carrinho.length) return alert('Carrinho vazio.');
            const t = calcularTotaisCarrinho();
            const num = Date.now().toString().slice(-8);
            
            // Monta o endereço completo
            const enderecoCompleto = `${clienteLogado.rua || ''}, ${clienteLogado.numero || ''} - ${clienteLogado.bairro || ''}, ${clienteLogado.regiao || ''}`;
            
            // Monta o resumo do pedido
            let itensMsg = '';
            carrinho.forEach(item => {
                itensMsg += `➡️ ${item.qtd}x ${item.nome}${item.marca ? ` (${item.marca})` : ''} - R$ ${(item.preco*item.qtd).toFixed(2)}\n`;
            });
            let detalhesMsg = `Subtotal: R$ ${t.subtotal.toFixed(2)}\n`;
            if(t.frete > 0) detalhesMsg += `Frete: R$ ${t.frete.toFixed(2)}\n`;
            if(t.seguro > 0) detalhesMsg += `Seguro (30%): R$ ${t.seguro.toFixed(2)}\n`;
            detalhesMsg += `💰 TOTAL: R$ ${t.total.toFixed(2)}`;
            
            const mensagem = `🛒 *NOVO PEDIDO #${num}*\n\n` +
                `👤 *Cliente:* ${clienteLogado.nome}\n` +
                `📄 *CPF:* ${clienteLogado.cpf}\n` +
                `📍 *Endereço:* ${enderecoCompleto}\n` +
                `📞 *Contato:* ${clienteLogado.contato}\n\n` +
                `📋 *ITENS DO PEDIDO:*\n${itensMsg}\n` +
                `${detalhesMsg}\n\n` +
                `💳 *PIX:* Fortpharma137@gmail.com\n` +
                `✅ *Confirmar pagamento para envio.*`;
            
            // Codifica a mensagem para URL
            const msgEncoded = encodeURIComponent(mensagem);
            const telefone = '5593991381813';
            
            if(confirm(`Confirma o pedido?\nTotal: R$ ${t.total.toFixed(2)}`)){
                const novoPedido = {
                    id: Date.now(), numero: num,
                    clienteId: clienteLogado.id,
                    clienteNome: clienteLogado.nome,
                    clienteContato: clienteLogado.contato,
                    clienteEndereco: enderecoCompleto,
                    clienteCpf: clienteLogado.cpf,
                    itens: carrinho.map(i => ({...i})),
                    subtotal: t.subtotal, frete: t.frete, seguro: t.seguro,
                    total: t.total,
                    status: 'pendente',
                    data: new Date().toISOString()
                };
                pedidos.unshift(novoPedido);
                db.collection('pedidos').doc(String(novoPedido.id)).set(novoPedido).catch(e=>console.error(e));
                carrinho=[]; seguroAtivo=false;
                salvarDadosLocais(); atualizarUI(); renderCarrinho();
                window.open(`https://wa.me/${telefone}?text=${msgEncoded}`, '_blank');
            }
        }
        
        // ... restante das funções mantidas iguais (renderGerenciarProdutos, upload, etc.)
    </script>
</body>
</html>
